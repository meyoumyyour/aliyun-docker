name: Sync Kdenlive to Aliyun

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 登录阿里云镜像仓库
        run: docker login -u ${{ secrets.ALIYUN_USERNAME }} -p ${{ secrets.ALIYUN_PASSWORD }} crpi-jlzkfoisf4mhudx0.cn-heyuan.personal.cr.aliyuncs.com

      - name: 从官方拉取带 Web 桌面环境的 Kdenlive 镜像
        run: docker pull lscr.io/linuxserver/kdenlive:latest

      - name: 打上你的阿里云专属标签
        # 【修改提示】：替换 YOUR_NAMESPACE 为 fnnas-docker
        run: docker tag lscr.io/linuxserver/kdenlive:latest crpi-jlzkfoisf4mhudx0.cn-heyuan.personal.cr.aliyuncs.com/fnnas-docker/kdenlive:latest

      - name: 推送镜像到你的阿里云
        # 【修改提示】：替换 YOUR_NAMESPACE 为 fnnas-docker
        run: docker push crpi-jlzkfoisf4mhudx0.cn-heyuan.personal.cr.aliyuncs.com/fnnas-docker/kdenlive:latest
